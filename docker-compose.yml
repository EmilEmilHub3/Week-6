services:
  mariadb:
    image: mariadb:11
    container_name: calculator-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: calculator
      MYSQL_USER: calculatoruser
      MYSQL_PASSWORD: calculatorpass
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  flyway:
    image: flyway/flyway:10
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./db/migrations:/flyway/sql
    command: >
      -url=jdbc:mariadb://mariadb:3306/calculator
      -user=calculatoruser
      -password=calculatorpass
      migrate

  api:
    build:
      context: .
      dockerfile: Calculator.Api/Dockerfile
    container_name: calculator-api
    restart: always
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__DefaultConnection: Server=mariadb;Port=3306;Database=calculator;User=calculatoruser;Password=calculatorpass;
    ports:
      - "8080:8080"